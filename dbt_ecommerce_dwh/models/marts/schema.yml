models:
  - name: fct_orders
    description: "Fact table for orders"
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        data_tests:
          - not_null:
              config:
                severity: error
          - unique:
              config:
                severity: error
      - name: customer_id
        description: "Identifier for the customer who placed the order"
        data_tests:
          - not_null:
              config:
                severity: error
      - name: order_status
        description: "Current status of the order"
        data_tests:
          - accepted_values:
              values: ['unavailable', 'shipped', 'processing', 'invoiced', 'delivered', 'created', 'canceled', 'approved']
              config:
                severity: warn
      - name: total_payment_value
        description: "Total payment value for the order"
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
              config:
                severity: error
      - name: total_items
        description: "Total number of items in the order"
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
              config:
                severity: error
      - name: delivery_time
        description: "Time taken to deliver the order"
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
              where: "order_status = 'delivered'"
              config:
                severity: warn

  - name: fct_order_reviews
    description: "Fact table for order reviews"
    columns:
      - name: order_id
        description: "Identifier for the order being reviewed"
        data_tests:
          - not_null:
              config:
                severity: error
          - unique:
              config:
                severity: error
          - relationships:
              to: ref('fct_orders')
              field: order_id
              config:
                severity: warn
      - name: review_score
        description: "Score given in the review"
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 1 and review_score <= 5"
              config:
                severity: warn

  - name: dim_customers
    description: "Dimension table for customers"
    columns:
      - name: customer_unique_id
        description: "Unique identifier for each customer"
        data_tests:
          - not_null:
              config:
                severity: error
          - unique:
              config:
                severity: error
      - name: total_orders
        description: "Total number of orders placed by the customer"
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
              config:
                severity: warn
      - name: total_spent
        description: "Total amount spent by the customer"
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
              config:
                severity: warn

  - name: dim_sellers
    description: "Dimension table for sellers"
    columns:
      - name: seller_id
        description: "Unique identifier for each seller"
        data_tests:
          - not_null:
              config:
                severity: error
          - unique:
              config:
                severity: error
      - name: total_revenue
        description: "Total revenue generated by the seller"
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
              config:
                severity: warn
      - name: total_orders
        description: "Total number of orders fulfilled by the seller"
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
              config:
                severity: warn
        
  - name: dim_products
    description: "Dimension table for products"
    columns:
      - name: product_id
        description: "Unique identifier for each product"
        data_tests:
          - not_null:
              config:
                severity: error
          - unique:
              config:
                severity: error